version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invertershield-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/models
      - PYTHONPATH=/app
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./models:/app/models
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invertershield-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
