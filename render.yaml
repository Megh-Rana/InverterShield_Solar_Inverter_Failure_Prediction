services:
  - type: web
    name: invertershield-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: MODEL_DIR
        value: /opt/render/project/src/models
      - key: GEMINI_API_KEY
        sync: false
    plan: free
